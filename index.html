<!DOCTYPE html>
<html lang='en'>
<head>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>WKA Referee Mentoring Feedback</title>
<link rel='stylesheet' href='styles.css'>
</head>
<body>
<h2>WKA Referee Mentoring Feedback</h2>
<div class='section'>
<h3>Referee Information</h3>
<label>Name</label><input type='text' id='name' class='autosave'>
<label>Club</label><input type='text' id='club' class='autosave'>
<label>Phone</label><input type='text' id='phone' class='autosave'>
<label>Current Grade</label>
<select id='grade' class='autosave'>
<option>Unqualified</option><option>Theory</option><option>Qualified</option><option>Regional</option><option>Higher (1B/1A/IKF)</option>
</select>
<label>Match(es)</label><input type='text' id='matches' class='autosave'>
<label>League + Date</label><input type='text' id='leagueDate' class='autosave'>
<label>Mentor Name</label><input type='text' id='mentorName' class='autosave'>
<label>Mentor Grade</label>
<select id='mentorGrade' class='autosave'>
<option>R</option><option>1B</option><option>1A</option><option>IKF</option>
</select>
</div>
<div class='section'>
<h3>Evaluation Categories</h3>
<div id='categories'></div>
</div>
<div class='section'>
<h3>Targets</h3>
<label>Target at Start</label><textarea id='targetStart' class='autosave'></textarea>
<label>Target for Second Half</label><textarea id='targetSecond' class='autosave'></textarea>
<label>Area to Improve Next Time</label><textarea id='improveNext' class='autosave'></textarea>
</div>
<div class='section'>
<h3>Finalisation</h3>
<label>Signed</label><input type='text' id='signed' class='autosave'>
<label>Date</label><input type='date' id='date' class='autosave'>
</div>
<button onclick='exportData()'>Export JSON</button>
<button onclick='exportPDF()'>Export PDF</button>
<button class='reset' onclick='resetForm()'>Start New Form</button>
<script src='jspdf.umd.min.js'></script>
<script src='script.js'></script>
</body></html>
